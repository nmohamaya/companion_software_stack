name: CI

on:
  push:
    branches: [main, develop, 'integration/**']
  pull_request:
    branches: [main, 'integration/**']

env:
  BUILD_TYPE: Release
  ZENOH_VERSION: "1.7.2"

jobs:
  # ── Fast gate: format check ──────────────────────────────────────
  format-check:
    runs-on: ubuntu-24.04
    name: format-check
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install clang-format
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends clang-format-18

    - name: Check clang-format
      run: |
        find common process[1-7]_* tests tools \( -name '*.h' -o -name '*.cpp' \) -print0 \
          | xargs -0 clang-format-18 --dry-run --Werror 2>&1

  # ── Doc SSOT gate: no hardcoded test-count totals (ADR-016) ──────
  # Lints only ADDED lines vs the base, so it blocks NEW drift without
  # failing on the existing backlog. tests/TESTS.md is the canonical source.
  doc-lint:
    runs-on: ubuntu-24.04
    name: doc-lint
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Lint docs for hardcoded test-count totals
      run: |
        BASE_REF="${{ github.base_ref || 'main' }}"
        git fetch -q origin "${BASE_REF}" || true
        bash deploy/lint_docs_ssot.sh --changed "origin/${BASE_REF}"

  # ── Static analysis: cppcheck (advisory, non-blocking) ───────────
  cppcheck:
    runs-on: ubuntu-24.04
    name: cppcheck (advisory)
    continue-on-error: true
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Install cppcheck
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends cppcheck
    - name: Run cppcheck
      run: bash deploy/run_cppcheck.sh

  # ── Build + test matrix ──────────────────────────────────────────
  # Intentionally NOT `needs: format-check` — see docs/how-to/CI_SETUP.md
  # § "Gate ordering" and Issue #758. A red format-check used to mask red
  # sanitizer legs by skipping the whole matrix; now both gates run in
  # parallel and independently block merge.
  build-and-test:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [none, asan, tsan, ubsan]

    name: build (${{ matrix.sanitizer == 'none' && 'default' || matrix.sanitizer }})

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential cmake \
          libspdlog-dev \
          libeigen3-dev \
          nlohmann-json3-dev \
          libgtest-dev \
          unzip

    - name: Install Zenoh
      run: |
        wget -q "https://github.com/eclipse-zenoh/zenoh-c/releases/download/${ZENOH_VERSION}/libzenohc-${ZENOH_VERSION}-x86_64-unknown-linux-gnu-debian.zip" \
          -O /tmp/zenohc.zip
        unzip -o /tmp/zenohc.zip -d /tmp/zenohc-debs
        sudo dpkg -i /tmp/zenohc-debs/*.deb

        git clone --depth 1 --branch "${ZENOH_VERSION}" \
          https://github.com/eclipse-zenoh/zenoh-cpp.git /tmp/zenoh-cpp
        cd /tmp/zenoh-cpp
        cmake -B build -DZENOHCXX_ZENOHC=ON -DZENOHCXX_ZENOHPICO=OFF
        sudo cmake --install build/

    - name: Fix ASLR for TSan
      if: matrix.sanitizer == 'tsan'
      run: sudo sysctl vm.mmap_rnd_bits=28

    - name: Configure CMake
      run: |
        SANITIZER_FLAGS=""
        BUILD_TYPE="${{ env.BUILD_TYPE }}"
        if [ "${{ matrix.sanitizer }}" = "asan" ]; then
          SANITIZER_FLAGS="-DENABLE_ASAN=ON"
          BUILD_TYPE="Debug"
        elif [ "${{ matrix.sanitizer }}" = "tsan" ]; then
          SANITIZER_FLAGS="-DENABLE_TSAN=ON"
          BUILD_TYPE="Debug"
        elif [ "${{ matrix.sanitizer }}" = "ubsan" ]; then
          SANITIZER_FLAGS="-DENABLE_UBSAN=ON"
          BUILD_TYPE="Debug"
        fi

        cmake -B build \
          -DCMAKE_BUILD_TYPE=${BUILD_TYPE} \
          -DCMAKE_CXX_FLAGS="-Werror -Wall -Wextra" \
          -DALLOW_INSECURE_ZENOH=ON \
          ${SANITIZER_FLAGS}

    - name: Build
      run: cmake --build build -j$(nproc)

    - name: Run tests
      working-directory: build
      run: |
        CTEST_EXCLUDE=""
        if [ "${{ matrix.sanitizer }}" = "tsan" ]; then
          # Exclude tests that create Zenoh sessions — libzenohc internal threading
          # produces TSan false positives (memcpy race in ListenersUnicastIP).
          # Our code is correctly synchronized (mutex/atomic around all Zenoh calls).
          # Any test creating ZenohMessageBus/ZenohSession can trigger this:
          # MessageBus, TopicResolver, ProcessContext, IpcRoundTrip, FaultCascade.
          # Also excludes MAVSDK/YOLO (external library threading).
          CTEST_EXCLUDE="Zenoh|Mavlink|Yolo|Liveliness|MessageBus|TopicResolver|ProcessContext|IpcRoundTrip|FaultCascade"
        fi
        if [ -n "${CTEST_EXCLUDE}" ]; then
          ctest --output-on-failure -j"$(nproc)" -E "${CTEST_EXCLUDE}"
        else
          ctest --output-on-failure -j"$(nproc)"
        fi

  # ── Code coverage report ─────────────────────────────────────────
  coverage:
    runs-on: ubuntu-24.04
    name: coverage
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential cmake \
          libspdlog-dev \
          libeigen3-dev \
          nlohmann-json3-dev \
          libgtest-dev \
          lcov unzip

    - name: Install Zenoh
      run: |
        wget -q "https://github.com/eclipse-zenoh/zenoh-c/releases/download/${ZENOH_VERSION}/libzenohc-${ZENOH_VERSION}-x86_64-unknown-linux-gnu-debian.zip" \
          -O /tmp/zenohc.zip
        unzip -o /tmp/zenohc.zip -d /tmp/zenohc-debs
        sudo dpkg -i /tmp/zenohc-debs/*.deb

        git clone --depth 1 --branch "${ZENOH_VERSION}" \
          https://github.com/eclipse-zenoh/zenoh-cpp.git /tmp/zenoh-cpp
        cd /tmp/zenoh-cpp
        cmake -B build -DZENOHCXX_ZENOHC=ON -DZENOHCXX_ZENOHPICO=OFF
        sudo cmake --install build/

    - name: Configure CMake (coverage)
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Debug \
          -DENABLE_COVERAGE=ON \
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
          -DALLOW_INSECURE_ZENOH=ON

    - name: Build
      run: cmake --build build -j$(nproc)

    - name: clang-tidy changed files (advisory)
      continue-on-error: true
      run: |
        sudo apt-get install -y --no-install-recommends clang-tidy-18 || true
        BASE_REF="${{ github.base_ref || 'main' }}"
        git fetch -q origin "${BASE_REF}" || true
        bash deploy/run_clang_tidy.sh --changed "origin/${BASE_REF}"

    - name: Zero counters
      run: lcov --zerocounters --directory build

    - name: Run tests
      working-directory: build
      run: ctest --output-on-failure -j$(nproc)

    - name: Capture coverage
      run: |
        lcov --capture --directory build --output-file coverage-raw.info \
          --ignore-errors mismatch,negative \
          --rc lcov_branch_coverage=1
        lcov --remove coverage-raw.info \
          '/usr/*' \
          '*/googletest/*' \
          '*/gtest/*' \
          '*/test/*' \
          '*/tests/*' \
          '*_test.cpp' \
          '*_test.h' \
          --output-file coverage.info \
          --ignore-errors unused \
          --rc lcov_branch_coverage=1
        lcov --list coverage.info --rc lcov_branch_coverage=1

    - name: Changed-line coverage delta (advisory)
      continue-on-error: true
      run: |
        BASE_REF="${{ github.base_ref || 'main' }}"
        git fetch -q origin "${BASE_REF}" || true
        python3 deploy/coverage_delta.py --coverage coverage.info --base "origin/${BASE_REF}"

    - name: Enforce coverage threshold
      run: |
        LCOV_SUMMARY=$(lcov --summary coverage.info 2>&1) || true
        COVERAGE=$(echo "$LCOV_SUMMARY" | sed -n 's/.*lines\.\.\.\.\.\.: \([0-9.]*\)%.*/\1/p')
        if [ -z "$COVERAGE" ] || ! echo "$COVERAGE" | grep -Eq '^[0-9]+(\.[0-9]+)?$'; then
          echo "::error::Failed to parse line coverage from lcov summary"
          echo "$LCOV_SUMMARY"
          exit 1
        fi
        echo "Line coverage: ${COVERAGE}%"
        if awk "BEGIN { exit !(${COVERAGE} < 70.0) }"; then
          echo "::error::Line coverage ${COVERAGE}% is below 70% threshold"
          exit 1
        fi

    - name: Generate HTML report
      run: genhtml coverage.info --output-directory coverage-report --title "Companion Stack Coverage" --rc genhtml_branch_coverage=1

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage-report/
        retention-days: 14

  # ── Orchestrator Python tests ─────────────────────────────────────
  orchestrator-tests:
    runs-on: ubuntu-24.04
    name: orchestrator-tests
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: pip install .[dev]

    - name: Run orchestrator tests
      run: python -m pytest tests/test_orchestrator/ -v --tb=short
