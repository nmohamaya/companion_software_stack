name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  BUILD_TYPE: Release

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        ipc_backend: [shm, zenoh]

    name: build (${{ matrix.ipc_backend }})

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential cmake \
          libspdlog-dev \
          libeigen3-dev \
          nlohmann-json3-dev \
          libgtest-dev

    - name: Install Zenoh (zenoh backend only)
      if: matrix.ipc_backend == 'zenoh'
      run: |
        sudo apt-get install -y --no-install-recommends unzip

        # Install zenohc 1.7.2 pre-built debian packages.
        # Note: these are built WITHOUT the shared-memory cargo feature,
        # so PosixShmProvider will return nullptr at runtime.  SHM-specific
        # tests use GTEST_SKIP() to handle this gracefully.
        # Building from source with -DZENOHC_BUILD_WITH_SHARED_MEMORY=ON
        # was attempted but produces opaque-type size mismatches on CI
        # (see CI_ISSUES.md CI-003).
        ZENOH_VERSION="1.7.2"
        wget -q "https://github.com/eclipse-zenoh/zenoh-c/releases/download/${ZENOH_VERSION}/libzenohc-${ZENOH_VERSION}-x86_64-unknown-linux-gnu-debian.zip" \
          -O /tmp/zenohc.zip
        unzip -o /tmp/zenohc.zip -d /tmp/zenohc-debs
        sudo dpkg -i /tmp/zenohc-debs/*.deb

        # Install zenoh-cpp (header-only, matching version)
        git clone --depth 1 --branch "${ZENOH_VERSION}" \
          https://github.com/eclipse-zenoh/zenoh-cpp.git /tmp/zenoh-cpp
        cd /tmp/zenoh-cpp
        cmake -B build -DZENOHCXX_ZENOHC=ON -DZENOHCXX_ZENOHPICO=OFF
        sudo cmake --install build/

    - name: Configure CMake
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
          -DCMAKE_CXX_FLAGS="-Werror -Wall -Wextra" \
          ${{ matrix.ipc_backend == 'zenoh' && '-DENABLE_ZENOH=ON -DALLOW_INSECURE_ZENOH=ON' || '' }}

    - name: Build
      run: cmake --build build -j$(nproc)

    - name: Run tests
      working-directory: build
      run: ctest --output-on-failure -j$(nproc)
