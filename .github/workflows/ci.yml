name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  BUILD_TYPE: Release
  ZENOH_VERSION: "1.7.2"

jobs:
  # ── Fast gate: format check ──────────────────────────────────────
  format-check:
    runs-on: ubuntu-24.04
    name: format-check
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install clang-format
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends clang-format-18

    - name: Check clang-format
      run: |
        find common process[1-7]_* tests \( -name '*.h' -o -name '*.cpp' \) -print0 \
          | xargs -0 clang-format-18 --dry-run --Werror 2>&1

  # ── Build + test matrix ──────────────────────────────────────────
  build-and-test:
    needs: format-check
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [none, asan, tsan, ubsan]

    name: build (${{ matrix.sanitizer == 'none' && 'default' || matrix.sanitizer }})

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential cmake \
          libspdlog-dev \
          libeigen3-dev \
          nlohmann-json3-dev \
          libgtest-dev \
          unzip

    - name: Install Zenoh
      run: |
        wget -q "https://github.com/eclipse-zenoh/zenoh-c/releases/download/${ZENOH_VERSION}/libzenohc-${ZENOH_VERSION}-x86_64-unknown-linux-gnu-debian.zip" \
          -O /tmp/zenohc.zip
        unzip -o /tmp/zenohc.zip -d /tmp/zenohc-debs
        sudo dpkg -i /tmp/zenohc-debs/*.deb

        git clone --depth 1 --branch "${ZENOH_VERSION}" \
          https://github.com/eclipse-zenoh/zenoh-cpp.git /tmp/zenoh-cpp
        cd /tmp/zenoh-cpp
        cmake -B build -DZENOHCXX_ZENOHC=ON -DZENOHCXX_ZENOHPICO=OFF
        sudo cmake --install build/

    - name: Fix ASLR for TSan
      if: matrix.sanitizer == 'tsan'
      run: sudo sysctl vm.mmap_rnd_bits=28

    - name: Configure CMake
      run: |
        SANITIZER_FLAGS=""
        BUILD_TYPE="${{ env.BUILD_TYPE }}"
        if [ "${{ matrix.sanitizer }}" = "asan" ]; then
          SANITIZER_FLAGS="-DENABLE_ASAN=ON"
          BUILD_TYPE="Debug"
        elif [ "${{ matrix.sanitizer }}" = "tsan" ]; then
          SANITIZER_FLAGS="-DENABLE_TSAN=ON"
          BUILD_TYPE="Debug"
        elif [ "${{ matrix.sanitizer }}" = "ubsan" ]; then
          SANITIZER_FLAGS="-DENABLE_UBSAN=ON"
          BUILD_TYPE="Debug"
        fi

        cmake -B build \
          -DCMAKE_BUILD_TYPE=${BUILD_TYPE} \
          -DCMAKE_CXX_FLAGS="-Werror -Wall -Wextra" \
          -DALLOW_INSECURE_ZENOH=ON \
          ${SANITIZER_FLAGS}

    - name: Build
      run: cmake --build build -j$(nproc)

    - name: Run tests
      working-directory: build
      run: |
        CTEST_EXCLUDE=""
        if [ "${{ matrix.sanitizer }}" = "tsan" ]; then
          # Exclude tests that depend on external libraries (Zenoh, MAVSDK, OpenCV YOLO)
          # whose internal threading produces false positives under TSan.
          # MessageBus uses ZenohMessageBus internally — same Zenoh false positives.
          CTEST_EXCLUDE="Zenoh|Mavlink|Yolo|Liveliness|MessageBus"
        fi
        if [ -n "${CTEST_EXCLUDE}" ]; then
          ctest --output-on-failure -j"$(nproc)" -E "${CTEST_EXCLUDE}"
        else
          ctest --output-on-failure -j"$(nproc)"
        fi

  # ── Code coverage report ─────────────────────────────────────────
  coverage:
    runs-on: ubuntu-24.04
    name: coverage
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential cmake \
          libspdlog-dev \
          libeigen3-dev \
          nlohmann-json3-dev \
          libgtest-dev \
          lcov unzip

    - name: Install Zenoh
      run: |
        wget -q "https://github.com/eclipse-zenoh/zenoh-c/releases/download/${ZENOH_VERSION}/libzenohc-${ZENOH_VERSION}-x86_64-unknown-linux-gnu-debian.zip" \
          -O /tmp/zenohc.zip
        unzip -o /tmp/zenohc.zip -d /tmp/zenohc-debs
        sudo dpkg -i /tmp/zenohc-debs/*.deb

        git clone --depth 1 --branch "${ZENOH_VERSION}" \
          https://github.com/eclipse-zenoh/zenoh-cpp.git /tmp/zenoh-cpp
        cd /tmp/zenoh-cpp
        cmake -B build -DZENOHCXX_ZENOHC=ON -DZENOHCXX_ZENOHPICO=OFF
        sudo cmake --install build/

    - name: Configure CMake (coverage)
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Debug \
          -DENABLE_COVERAGE=ON \
          -DALLOW_INSECURE_ZENOH=ON

    - name: Build
      run: cmake --build build -j$(nproc)

    - name: Zero counters
      run: lcov --zerocounters --directory build

    - name: Run tests
      working-directory: build
      run: ctest --output-on-failure -j$(nproc)

    - name: Capture coverage
      run: |
        lcov --capture --directory build --output-file coverage-raw.info \
          --ignore-errors mismatch \
          --rc lcov_branch_coverage=1
        lcov --remove coverage-raw.info \
          '/usr/*' \
          '*/googletest/*' \
          '*/gtest/*' \
          '*/test/*' \
          '*/tests/*' \
          '*_test.cpp' \
          '*_test.h' \
          --output-file coverage.info \
          --ignore-errors unused \
          --rc lcov_branch_coverage=1
        lcov --list coverage.info --rc lcov_branch_coverage=1

    - name: Generate HTML report
      run: genhtml coverage.info --output-directory coverage-report --title "Companion Stack Coverage" --rc genhtml_branch_coverage=1

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage-report/
        retention-days: 14
