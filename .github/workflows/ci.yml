name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  BUILD_TYPE: Release

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        ipc_backend: [shm, zenoh]

    name: build (${{ matrix.ipc_backend }})

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential cmake \
          libspdlog-dev \
          libeigen3-dev \
          nlohmann-json3-dev \
          libgtest-dev

    - name: Cache Zenoh libraries
      if: matrix.ipc_backend == 'zenoh'
      id: cache-zenoh
      uses: actions/cache@v4
      with:
        path: /tmp/zenoh-install
        key: zenoh-1.7.2-shm-${{ runner.os }}-${{ runner.arch }}

    - name: Install Rust (for zenoh-c source build)
      if: matrix.ipc_backend == 'zenoh' && steps.cache-zenoh.outputs.cache-hit != 'true'
      uses: dtolnay/rust-toolchain@stable

    - name: Build Zenoh from source
      if: matrix.ipc_backend == 'zenoh' && steps.cache-zenoh.outputs.cache-hit != 'true'
      run: |
        ZENOH_VERSION="1.7.2"

        # Build zenohc from source with shared-memory support.
        # The pre-built debian packages omit the shared-memory cargo feature,
        # which is required for PosixShmProvider (Phase C zero-copy video).
        git clone --depth 1 --branch "${ZENOH_VERSION}" \
          https://github.com/eclipse-zenoh/zenoh-c.git /tmp/zenoh-c
        cd /tmp/zenoh-c
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=/tmp/zenoh-install \
          -DZENOHC_BUILD_WITH_SHARED_MEMORY=ON
        cmake --build build -j$(nproc)
        cmake --install build

        # Build zenoh-cpp (header-only, matching version)
        git clone --depth 1 --branch "${ZENOH_VERSION}" \
          https://github.com/eclipse-zenoh/zenoh-cpp.git /tmp/zenoh-cpp
        cd /tmp/zenoh-cpp
        cmake -B build \
          -DCMAKE_INSTALL_PREFIX=/tmp/zenoh-install \
          -DZENOHCXX_ZENOHC=ON -DZENOHCXX_ZENOHPICO=OFF
        cmake --install build

    - name: Install Zenoh from cache
      if: matrix.ipc_backend == 'zenoh'
      run: sudo cp -a /tmp/zenoh-install/* /usr/local/

    - name: Configure CMake
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
          -DCMAKE_CXX_FLAGS="-Werror -Wall -Wextra" \
          ${{ matrix.ipc_backend == 'zenoh' && '-DENABLE_ZENOH=ON -DALLOW_INSECURE_ZENOH=ON' || '' }}

    - name: Build
      run: cmake --build build -j$(nproc)

    - name: Run tests
      working-directory: build
      run: ctest --output-on-failure -j$(nproc)
