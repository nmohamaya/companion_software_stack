# ============================================================================
# docker-compose.cosys.yml — Companion Stack + Cosys-AirSim Cloud Deployment
# ============================================================================
# Two-service architecture for cloud GPU instances:
#   1. cosys-airsim: UE5 headless rendering + PX4 SITL + AirSim RPC
#   2. companion-stack: 7-process drone stack with cloud ML model preset
#
# Requires: NVIDIA Container Toolkit (--gpus all), ~16GB VRAM total.
# Target instance: AWS g5.xlarge (A10G 24GB) or equivalent.
#
# Usage:
#   docker compose -f docker/docker-compose.cosys.yml up --build
#   docker compose -f docker/docker-compose.cosys.yml up -d
#   docker compose -f docker/docker-compose.cosys.yml logs -f
#   docker compose -f docker/docker-compose.cosys.yml down
#
# The Docker Compose layer is fully cloud-agnostic. Provider-specific
# provisioning lives in cloud/providers/$CLOUD_PROVIDER.sh.
# ============================================================================

services:
  # ── Companion stack (extends base service) ─────────────────────────────────
  companion-stack:
    extends:
      file: docker-compose.yml
      service: companion-stack
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MODEL_PRESET: cloud
    # Override base mem_limit/mem_reservation for cloud instances (more RAM available)
    mem_limit: 16g
    mem_reservation: 4g
    depends_on:
      cosys-airsim:
        condition: service_healthy
    environment:
      - DRONE_LOG_DIR=/app/drone_logs
      - COSYS_AIRSIM_HOST=cosys-airsim
      - COSYS_AIRSIM_PORT=41451
      - DRONE_CONFIG=/app/config/cosys_airsim.json
      # Request GPU access via NVIDIA Container Toolkit runtime
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    runtime: nvidia
    volumes:
      - ../config:/app/config:ro
      - models:/app/models
      - logs:/app/drone_logs
      - artifacts:/app/artifacts
    networks:
      - sim-network

  # ── Cosys-AirSim photorealistic simulator ──────────────────────────────────
  # Runs UE5 headless with PX4 SITL integration. Provides synthetic camera,
  # depth, radar, and IMU data via the AirSim RPC API (port 41451).
  cosys-airsim:
    image: cosys-lab/cosys-airsim:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,graphics,display
    volumes:
      - ../config/cosys_settings.json:/home/airsim/Documents/AirSim/settings.json:ro
      - airsim-data:/home/airsim/data
    ports:
      - "41451:41451"    # AirSim RPC API
      - "14540:14540"    # PX4 SITL MAVLink
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:41451/api/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s   # UE5 takes time to load assets
    networks:
      - sim-network
    restart: unless-stopped

networks:
  sim-network:
    driver: bridge

volumes:
  models:
  logs:
  artifacts:
  airsim-data:
