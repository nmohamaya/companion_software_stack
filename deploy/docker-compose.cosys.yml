# deploy/docker-compose.cosys.yml — Docker Compose for Cosys-AirSim + companion stack.
#
# Usage:
#   docker compose -f deploy/docker-compose.cosys.yml up
#   docker compose -f deploy/docker-compose.cosys.yml up --build
#   docker compose -f deploy/docker-compose.cosys.yml down
#
# Services:
#   cosys-airsim    — UE5 + Cosys-AirSim simulator (GPU required)
#   companion-stack — 7-process companion stack
#
# Issue: #463 (part of Epic #459)

services:
  cosys-airsim:
    image: cosys-airsim:latest
    container_name: cosys-airsim
    hostname: cosys-airsim
    networks:
      - cosys-net
    ports:
      - "41451:41451"   # AirSim RPC
      - "14540:14540"   # PX4 MAVLink (UDP)
      - "14580:14580"   # PX4 MAVLink secondary
    volumes:
      - ./config/cosys_settings.json:/home/airsim/Documents/AirSim/settings.json:ro
      - cosys-logs:/opt/cosys/logs
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - DISPLAY=${DISPLAY:-:1}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ss -tlnp | grep -q ':41451' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  companion-stack:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.cosys
      target: runtime
    container_name: companion-stack
    hostname: companion-stack
    networks:
      - cosys-net
    depends_on:
      cosys-airsim:
        condition: service_healthy
    volumes:
      - ./config:/opt/companion-stack/config:ro
      - drone-models:/opt/companion-stack/models:ro
      - drone-logs:/opt/companion-stack/drone_logs
    environment:
      - DRONE_LOG_DIR=/opt/companion-stack/drone_logs
      - ALLOW_INSECURE_ZENOH=ON
    command: ["--profile", "cloud"]
    restart: unless-stopped

networks:
  cosys-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  cosys-logs:
  drone-logs:
  drone-models:
